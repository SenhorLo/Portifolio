<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Página de contato por e-mail de Lorenzo Tacca Orssatto." />
    <title>Contato por Email | Lorenzo Tacca Orssatto</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-flow" aria-hidden="true">
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>
      <span class="bubble"></span>
    </div>

    <nav class="navbar navbar-expand-lg navbar-dark fixed-top nav-blur">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="./index.html">LTODEV</a>
        <a class="btn btn-sm btn-outline-light" href="./index.html#contato">
          <i class="bi bi-arrow-left"></i>
          Voltar
        </a>
      </div>
    </nav>

    <main>
      <section class="section hero">
        <div class="container">
          <div class="row justify-content-center">
            <div class="col-lg-8 col-xl-7">
              <div class="card card-surface">
                <div class="card-body p-4 p-md-5">
                  <h1 class="h3 fw-semibold mb-2">Envio de email</h1>
                  <p class="text-body-secondary mb-4">
                    Preencha os campos abaixo para enviar sua mensagem.
                  </p>

                  <form id="contactForm" novalidate>
                    <div class="mb-3">
                      <label class="form-label" for="nome">Nome</label>
                      <input id="nome" name="nome" type="text" class="form-control" required />
                      <div class="invalid-feedback">Informe seu nome.</div>
                    </div>

                    <div class="mb-3">
                      <label class="form-label" for="email">Email</label>
                      <input id="email" name="email" type="email" class="form-control" required />
                      <div class="invalid-feedback">Informe um email válido.</div>
                    </div>

                    <div class="mb-3">
                      <label class="form-label" for="mensagem">Mensagem</label>
                      <textarea id="mensagem" name="mensagem" class="form-control" rows="6" required></textarea>
                      <div class="invalid-feedback">Escreva sua mensagem.</div>
                    </div>

                    <div class="d-flex flex-wrap gap-2 align-items-center">
                      <button type="submit" class="btn btn-accent">
                        <i class="bi bi-send"></i>
                        Enviar email
                      </button>
                      <small id="formStatus" class="text-body-secondary"></small>
                    </div>
                  </form>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <footer class="py-4 border-top border-light border-opacity-10">
        <div class="container d-flex flex-wrap justify-content-between align-items-center gap-2">
          <div class="text-body-secondary small">© <span id="year"></span> Lorenzo Tacca Orssatto</div>
          <a class="link-secondary small" href="./index.html#home">Voltar ao início</a>
        </div>
      </footer>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script src="./script.js"></script>
  </body>
</html>
